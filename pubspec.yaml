name: snapspot
description: AI-powered travel and social content creation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.3
  dio: ^5.8.0+1
  cached_network_image: ^3.4.1
  purchases_flutter: ^8.6.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/mock_api/
